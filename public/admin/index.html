<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Hope Bar Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f2f0eb;
      --gray:  #888;
      --gray-md: #2e2e2e;
      --gold:  #c9a84c;
      --ff-d: 'Bebas Neue', Impact, sans-serif;
      --ff:   'Space Mono', 'Courier New', monospace;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
      mix-blend-mode: overlay;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      font-family: var(--ff);
      cursor: crosshair;
    }

    /* ── TOP BAR ── */
    #adminBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 3000;
      height: 52px;
      background: var(--black);
      border-bottom: 1px solid var(--gray-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bar-logo {
      display: flex;
      flex-direction: column;
    }
    .bar-logo-name {
      font-family: var(--ff-d);
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }
    .bar-logo-line {
      height: 2px;
      background: var(--gold);
      opacity: 0.85;
      margin-top: 2px;
    }
    .bar-sep {
      width: 1px;
      height: 20px;
      background: var(--gray-md);
    }
    .bar-sub {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--gray);
      text-transform: uppercase;
    }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Hidden by default — shown only when logged in */
    #barUserLabel {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      display: none;
    }
    #barUserName {
      font-size: 12px;
      color: var(--white);
      font-family: var(--ff);
      display: none;
    }
    #barLogoutBtn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border: 1px solid var(--gray-md);
      background: transparent;
      color: var(--gray);
      font-family: var(--ff);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }
    #barLogoutBtn:hover {
      border-color: var(--white);
      background: var(--white);
      color: var(--black);
    }

    /* Push CMS below our bar */
    #nc-root {
      padding-top: 52px;
    }

    /* Try to push Netlify CMS toolbar below our bar */
    [class*="AppHeader"],
    [class*="ToolbarContainer"] {
      top: 52px !important;
    }
  </style>
</head>
<body>

<div id="adminBar">
  <div class="bar-left">
    <div class="bar-logo">
      <div class="bar-logo-name">LAST HOPE</div>
      <div class="bar-logo-line"></div>
    </div>
    <div class="bar-sep"></div>
    <div class="bar-sub">Admin Panel</div>
  </div>

  <div class="bar-right">
    <span id="barUserLabel">Logged in as</span>
    <span id="barUserName"></span>
    <button id="barLogoutBtn">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Log out
    </button>
  </div>
</div>

<div id="nc-root"></div>

<script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
<script>
  const userLabel  = document.getElementById('barUserLabel')
  const userName   = document.getElementById('barUserName')
  const logoutBtn  = document.getElementById('barLogoutBtn')

  function showUser(user) {
    const name = (user.user_metadata && user.user_metadata.full_name) || user.email || '—'
    userName.textContent  = name
    userLabel.style.display  = 'block'
    userName.style.display   = 'block'
    logoutBtn.style.display  = 'inline-flex'
  }

  function hideUser() {
    userLabel.style.display  = 'none'
    userName.style.display   = 'none'
    logoutBtn.style.display  = 'none'
    userName.textContent = ''
  }

  // Check current user once identity widget is ready
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', user => {
      if (user) { showUser(user) } else { hideUser() }
    })
    window.netlifyIdentity.on('login',  user => showUser(user))
    window.netlifyIdentity.on('logout', ()   => hideUser())
  }

  logoutBtn.addEventListener('click', () => {
    if (window.netlifyIdentity) window.netlifyIdentity.logout()
  })

  CMS.init({ config: '/admin/config.yml' })
</script>

</body>
</html>
