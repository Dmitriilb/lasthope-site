backend:
  name: git-gateway
  branch: main

media_folder: "public/photos"
public_folder: "/photos"

collections:
  - name: "bar_info"
    label: "Bar info"
    files:
      - name: "bar_info"
        label: "Bar info"
        file: "src/data/barInfo.json"
        format: "json"
        fields:
          - label: "Bar info"
            name: "barInfo"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Google Place ID", name: "placeId", widget: "string" }
              - { label: "Latitude", name: "lat", widget: "number" }
              - { label: "Longitude", name: "lng", widget: "number" }
              - { label: "Google Maps URL", name: "mapsUrl", widget: "string" }
              - { label: "Instagram handle", name: "instagram", widget: "string" }
              - { label: "Telegram placeholder", name: "telegram", widget: "string" }

  - name: "drinks"
    label: "Drinks"
    files:
      - name: "drinks"
        label: "Drinks"
        file: "src/data/drinks.json"
        format: "json"
        fields:
          - label: "Drinks"
            name: "drinks"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }

  - name: "events"
    label: "Events"
    files:
      - name: "events"
        label: "Events"
        file: "src/data/events.json"
        format: "json"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Time", name: "time", widget: "string" }

  - name: "reviews"
    label: "Reviews"
    files:
      - name: "reviews"
        label: "Reviews"
        file: "src/data/reviews.json"
        format: "json"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Source", name: "source", widget: "string" }

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery"
        label: "Gallery"
        file: "src/data/galleryItems.json"
        format: "json"
        fields:
          - label: "Gallery"
            name: "galleryItems"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Image", name: "src", widget: "image", allow_multiple: false }
              - { label: "Alt text", name: "alt", widget: "string" }

  - name: "promo"
    label: "Promo"
    files:
      - name: "promo"
        label: "Promo"
        file: "src/data/promo.json"
        format: "json"
        fields:
          - label: "Promo"
            name: "promo"
            widget: "object"
            fields:
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Deal", name: "deal", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }

  - name: "hours"
    label: "Hours"
    files:
      - name: "hours"
        label: "Hours"
        file: "src/data/hours.json"
        format: "json"
        fields:
          - label: "Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Mon–Thu", name: "monThu", widget: "string" }
              - { label: "Fri–Sat", name: "friSat", widget: "string" }
              - { label: "Sunday", name: "sun", widget: "string" }
              - { label: "Happy hour", name: "happy", widget: "string" }
